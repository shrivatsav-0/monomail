name: Auto Label Issues
on:
  issues:
    types: [opened, edited]

jobs:
  auto-label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const labels = [];

            // Types
            if (body.includes('UI / Visual')) labels.push('type: ui');
            if (body.includes('Crash / ANR')) labels.push('type: crash');
            if (body.includes('Sync / Network')) labels.push('type: sync');
            if (body.includes('Performance')) labels.push('type: performance');
            if (body.includes('Security')) labels.push('type: security');

            // Priorities
            if (body.includes('Low (Minor annoyance)')) labels.push('priority: low');
            if (body.includes('Medium (Workaround available)')) labels.push('priority: medium');
            if (body.includes('High (Core feature broken)')) labels.push('priority: high');
            if (body.includes('Critical (App unusable / Data loss)')) labels.push('priority: critical');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labels
              });
            }
