name: Test OpenCode

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install OpenCode
        run: npm install -g opencode-ai

      - name: Verify OpenCode
        run: |
          opencode --version
          opencode run --help

      - name: Create sample commits
        run: |
          cat <<EOF > commit_log.txt
          feat: add dark mode
          fix: resolve login issue
          chore: update dependencies
          EOF

      - name: Run OpenCode
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          PROMPT=$(cat <<'EOF'
          Write concise, user-facing GitHub release notes.

          Group changes under:
          - Features
          - Bug Fixes
          - Maintenance

          Omit any empty section.

          Use ONLY the commits below.
          Don't invent features.
          Output Markdown only.

          Commits:
          EOF
          )

          PROMPT="$PROMPT
          $(cat commit_log.txt)"

          echo "===== PROMPT ====="
          echo "$PROMPT"

          opencode run "$PROMPT" \
            --model opencode/mimo-v2.5-free \
            --print-logs \
            | tee release_notes.md

      - name: Show output
        if: always()
        run: |
          echo "===== release_notes.md ====="
          cat release_notes.md || true

      - name: Upload release notes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release_notes.md
